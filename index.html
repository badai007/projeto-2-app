<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">

  <button id="menuToggleBtn" class="menu-toggle-btn">☰</button>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <aside id="sidebar" class="sidebar hidden-sidebar">
    <div class="sidebar-header">
      <h2>Opções</h2>
      <button id="closeSidebarBtn" class="close-sidebar-btn">✕</button>
    </div>

    <nav class="sidebar-menu">
      <button class="menu-item">Tarefas adicionadas</button>
      <button id="changeUserBtn" class="menu-item logout-btn">Trocar nome</button>
    </nav>
  </aside>

  <main class="dashboard simple-dashboard">
    <header class="dashboard-header">
      <div>
        <p id="currentDate" class="current-date"></p>
        <h1 id="greetingTitle">Olá</h1>
        <p class="subtitle">Organize suas tarefas do dia</p>
      </div>
    </header>

    <section class="card create-task-card">
      <h2>Adicionar tarefa</h2>

      <div class="task-form">
        <input type="text" id="taskInput" placeholder="Digite uma tarefa">
        <button id="addBtn">Adicionar</button>
      </div>
    </section>

    <section class="card tasks-card">
      <div class="tasks-card-header">
        <h2>Tarefas adicionadas</h2>
        <p id="taskCounter">Total: 0</p>
      </div>

      <ul id="taskList"></ul>

      <p id="emptyMessage" class="empty-message">Nenhuma tarefa adicionada ainda.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
