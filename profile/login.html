<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body class="profile-page">
  <main class="container">
    <section class="profile-card">
      <div class="profile-copy">
        <span class="badge">Perfil</span>
        <h1>Bem-vindo</h1>
        <p>Informe seu usuario ou email e sua senha. O app envia os dados ao backend, espera a resposta e so depois decide o proximo passo.</p>
      </div>

      <form id="profileForm" class="profile-form">
        <label for="userIdentifier">Usuario ou email</label>
        <div class="input-box">
          <input id="userIdentifier" name="userIdentifier" placeholder="Digite seu usuario ou email" type="text" autocomplete="username" required>
        </div>

        <label for="password">Senha</label>
        <div class="input-box">
          <input id="password" name="password" placeholder="Digite sua senha" type="password" autocomplete="current-password" required>
        </div>

        <p id="formMessage" class="form-message" aria-live="polite"></p>

        <button id="submitButton" type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <script src="login.js"></script>

  
</body>
</html>
